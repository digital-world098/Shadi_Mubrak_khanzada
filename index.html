<!DOCTYPE html><html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadi Mubarak Adnan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);background-size:400% 400%;animation:bg 12s ease infinite;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#fff;text-align:center;overflow:hidden}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
body:before,body:after{content:'❤';position:absolute;font-size:28px;opacity:.25;animation:float 8s linear infinite}
body:before{left:10%;top:100%}
body:after{right:15%;top:100%;animation-delay:4s}
@keyframes float{from{transform:translateY(0)}to{transform:translateY(-120vh)}}
.card{background:rgba(255,255,255,0.14);padding:45px;border-radius:28px;max-width:760px;box-shadow:0 15px 40px rgba(0,0,0,.25);backdrop-filter:blur(12px)}
h1{font-family:'Great Vibes',cursive;font-size:64px;margin:0 0 12px;line-height:1.1}
h1 .small{display:block;font-size:40px;font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:2px}
p{font-size:22px;line-height:1.7}
button{margin-top:22px;padding:14px 28px;border:none;border-radius:40px;background:#fff;color:#d63384;font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.hidden{opacity:0;max-height:0;overflow:hidden;transition:all .8s ease;font-size:24px;margin-top:18px}
.show{opacity:1;max-height:100px}
.secret{color:transparent;user-select:none}
h1::first-letter{font-size:96px;color:#fff7b2;text-shadow:0 0 12px rgba(255,255,255,.45);font-family:'Great Vibes',cursive;position:relative}
</style>
</head>
<body>
<div class="card">
<h1><span class="small">💍 SHADI</span>Mubarak 💖</h1>
<p>Khanzada Adnan, tumhari zindagi mohabbat, khushiyon aur barkat se hamesha roshan rahe. Har din tum dono ke liye nayi muskurahat aur pyar lekar aaye. ✨</p>
<p>Dua hai ke tumhari jori chand sitaron se bhi zyada khoobsurat rahe. ❤️</p>
<span class="secret">Zafran</span>
<button onclick="reveal()">Ik Chhupa Paigham Dekho</button>
<div id="msg" class="hidden">🌹 Yeh paigham dil se bhejne wala: <b>Zafran</b> 🌹</div>
</div>
<script>
function reveal(){document.getElementById('msg').classList.add('show');}
</script>
</body>
</html>
